<!doctype html>
<html lang="ar">
  <head>
    <link rel="icon" href="/favicon.ico?v=2">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الاستعلام عن المقررات الدراسية</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap");

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Cairo", sans-serif;
        background: linear-gradient(135deg, #0f172a, #020617);
        color: #fff;
        margin: 0;
        padding: 0;

        /* يخلي الفوتر تحت */
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .container {
        max-width: 700px;
        margin: auto;
        padding: 40px 20px;
        flex: 1;
      }

      h1 {
        text-align: center;
        margin-bottom: 30px;
        font-weight: 600;
      }

      .counter {
        text-align: center;
        margin-bottom: 20px;
        color: #94a3b8;
        font-size: 14px;
      }

      .search-box {
        position: relative;
      }

      input {
        width: 100%;
        padding: 15px 20px;
        border-radius: 15px;
        border: none;
        outline: none;
        font-size: 16px;
        background: #1e293b;
        color: white;
        transition: 0.3s;
      }

      input:focus {
        box-shadow: 0 0 15px #3b82f6;
      }

      .results {
        margin-top: 30px;
      }

      .card {
        background: rgba(30, 41, 59, 0.8);
        padding: 20px;
        border-radius: 20px;
        margin-bottom: 20px;
        animation: fadeIn 0.4s ease;
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px) scale(1.01);
        box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
      }

      .name {
        font-size: 18px;
        font-weight: 600;
      }

      .number {
        color: #94a3b8;
        margin: 5px 0;
      }

      .course {
        margin-top: 5px;
        padding: 5px 10px;
        background: #0f172a;
        border-radius: 10px;
        display: inline-block;
        margin-right: 5px;
        margin-top: 8px;
        font-size: 14px;
      }

      .no-result {
        text-align: center;
        color: #94a3b8;
        margin-top: 20px;
      }

      /* ✅ Footer بنفس الاستايل */
      footer {
        text-align: center;
        padding: 15px;
        background: rgba(15, 23, 42, 0.9);
        color: #94a3b8;
        font-size: 14px;
        border-top: 1px solid rgba(148, 163, 184, 0.2);
        backdrop-filter: blur(10px);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
        .dashboard-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, #16537e, #cfe2f3);
  color: #000;
  border: none;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(0,200,255,0.4);
  transition: all 0.3s ease;
  overflow: hidden;
}

.dashboard-btn .text {
  opacity: 0;
  max-width: 0;
  transition: all 0.3s ease;
  white-space: nowrap;
}

.dashboard-btn:hover {
  padding: 10px 18px;
}

.dashboard-btn:hover .text {
  opacity: 1;
  max-width: 120px;
}

.dashboard-btn:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 0 25px rgba(0,200,255,0.7);
}
    </style>
  </head>

  <body>
      <button class="dashboard-btn" onclick="goDashboard()">
  <span>📊</span>
  <span class="text">Dashboard</span>
</button>
    <div class="container">
      <h1>الاستعلام عن المقررات الدراسية</h1>

      <div class="counter">
        عدد الزوار: <span id="visitCount">...</span>
      </div>

      <div class="search-box">
        <input
          type="text"
          id="search"
          placeholder="اكتب الاسم أو الرقم الأكاديمي..."
        />
      </div>

      <div class="results" id="results"></div>
    </div>

    <!-- ✅ Footer -->
    <footer>
      © 2026 StudentsCourses · Developed by Ali Ashraf
    </footer>

    <script>
      const MAX_RESULTS = 20;

      let debounceTimer = null;
      let counted = false;

      function loadCounter() {
        fetch("counter.php?action=get")
          .then((res) => res.json())
          .then((data) => {
            const el = document.getElementById("visitCount");
            if (el) el.innerText = data.count ?? 0;
          })
          .catch(() => {
            const el = document.getElementById("visitCount");
            if (el) el.innerText = "—";
          });
      }

      loadCounter();

      setInterval(loadCounter, 5000);

      document.getElementById("search").addEventListener("input", function () {
        clearTimeout(debounceTimer);

        const value = this.value.trim();
        const resultsDiv = document.getElementById("results");

        if (!value) {
          counted = false;
          resultsDiv.innerHTML = "";
          return;
        }

        debounceTimer = setTimeout(() => {
          if (!counted) {
            counted = true;
            fetch("counter.php?action=increment")
              .then((res) => res.json())
              .then((data) => {
                const el = document.getElementById("visitCount");
                if (el) el.innerText = data.count;
              });
          }

          fetch("search.php?q=" + encodeURIComponent(value))
            .then((res) => res.json())
            .then((data) => {
              resultsDiv.innerHTML = "";

              if (!data.results.length) {
                resultsDiv.innerHTML = `<div class="no-result">لا يوجد نتائج</div>`;
                return;
              }

              const fragment = document.createDocumentFragment();

              data.results.forEach((item) => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
              <div class="name">${item.name}</div>
              <div class="number">الرقم: ${item.number}</div>
              <div>عدد المواد: ${item.courses.length}</div>
              <div>${item.courses.map((c) => `<span class="course">${c}</span>`).join("")}</div>
            `;
                fragment.appendChild(card);
              });

              resultsDiv.appendChild(fragment);
            });
        }, 300);
      });

function goDashboard() {
  window.location.href = "dashboard.html";
}

    </script>
    
  </body>
</html>
